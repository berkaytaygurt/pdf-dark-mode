<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dark Mode PDF</title>

    <!-- Font Awesome'ı kaldır veya emoji kullan -->
    <script src="pdf-lib.min.js"></script>
    <script src="pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'pdf.worker.min.js';
    </script>

    <style>
        :root { --primary: #00f2ff; --secondary: #bd00ff; --bg: #0f0f13; --card-bg: rgba(25, 25, 30, 0.95); --text: #ffffff; --gold: #ffd700; }
        body { background-color: var(--bg); background-image: linear-gradient(135deg, #0f0f13 0%, #1a1a2e 100%); color: var(--text); font-family: 'Segoe UI', Roboto, sans-serif; min-height: 100vh; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 20px; box-sizing: border-box; }
        .container { width: 100%; max-width: 600px; background: var(--card-bg); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 25px; text-align: center; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5); position: relative; display: flex; flex-direction: column; gap: 15px; margin-top: 120px; margin-bottom: 80px; overflow: hidden; }
        .container::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: var(--gold); }
        .lang-switch { position: absolute; top: 20px; right: 20px; background: rgba(255, 255, 255, 0.05); border-radius: 20px; padding: 4px; display: flex; gap: 4px; z-index: 10; }
        .lang-btn { background: transparent; border: none; color: #666; padding: 4px 12px; border-radius: 15px; font-size: 0.75rem; font-weight: bold; cursor: pointer; transition: all 0.3s; }
        .lang-btn.active { background: var(--primary); color: #000; box-shadow: 0 0 8px rgba(0, 242, 255, 0.3); }
        h1 { margin: 25px 0 0 0; font-size: 1.8rem; background: linear-gradient(to right, #fff, #bbb); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p.subtitle { color: #888; margin: 0; font-size: 0.9em; }
        .vip-area { display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 5px; gap: 5px; }
        .vip-btn { background: rgba(255,255,255,0.05); border: 1px solid #444; color: #aaa; padding: 8px 20px; border-radius: 20px; font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all 0.3s; }
        .vip-btn.active { background: linear-gradient(45deg, var(--gold), #ffaa00); color: #000; border: none; box-shadow: 0 0 15px rgba(255, 215, 0, 0.3); font-weight: bold; transform: scale(1.05); }
        .vip-benefits { font-size: 0.75rem; color: #888; max-width: 80%; line-height: 1.3; }
        .vip-benefits.hidden { display: none; }
        .drop-zone { border: 2px dashed rgba(255, 255, 255, 0.2); border-radius: 16px; height: 100px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(255,255,255,0.02); cursor: pointer; transition: all 0.3s; position: relative; margin-top: 5px; }
        .drop-zone.dragover { border-color: var(--primary); background: rgba(0, 242, 255, 0.05); }
        .file-info { display: none; margin-top: 5px; color: var(--primary); font-weight: 600; padding: 4px 10px; border-radius: 8px; font-size:0.8rem; }
        #fileInput { display: none; }
        #filter-grid { display: none; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; width: 100%; }
        .filter-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 8px; cursor: pointer; position: relative; }
        .filter-card canvas { width: 100%; height: auto; border-radius: 6px; display: block; }
        .filter-name { margin-top: 8px; font-size: 0.85rem; font-weight: bold; color: #ccc; }
        .card-loader { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 2; border-radius: 12px; }
        .spinner-small { width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: var(--primary); animation: spin 1s ease-in-out infinite; }
        #status { font-size: 0.9em; color: #666; margin-top: 15px; min-height: 1.2em; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        #convertBtn {
            display:none;
            width:100%;
            margin-top:15px;
            margin-bottom:10px;
            padding:16px;
            border-radius:16px;
            background:linear-gradient(135deg, #00e676, #00c853);
            border:none;
            color:#000;
            font-weight:bold;
            cursor:pointer;
            font-size: 1.1rem;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 230, 118, 0.3);
            animation: pulse 2s ease-in-out infinite;
        }
        #convertBtn:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 25px rgba(0, 230, 118, 0.5);
        }
        #convertBtn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="lang-switch">
        <button class="lang-btn" id="btn-tr" onclick="setLanguage('tr')">TR</button>
        <button class="lang-btn" id="btn-en" onclick="setLanguage('en')">EN</button>
    </div>

    <h1 id="txt-title">Dark Mode PDF</h1>
    <p class="subtitle" id="txt-subtitle">Advanced Reading Mode</p>

    <div class="vip-area">
        <button id="vip-btn" class="vip-btn" onclick="handleVipClick()">
            👑<span id="txt-vip">VIP</span>
        </button>
        <div id="vip-benefits" class="vip-benefits"></div>
    </div>

    <label for="fileInput" class="drop-zone" id="dropZone">
        <div id="dropText">Select PDF File</div>
        <div class="file-info" id="fileInfo"></div>
    </label>
    <input type="file" id="fileInput" accept="application/pdf">

    <div id="status"></div>
    <button id="convertBtn"></button>

    <div id="filter-grid">
        <div class="filter-card" onclick="onFilterClick('dark')">
            <div class="card-loader" id="loader-dark"><div class="spinner-small"></div></div>
            <canvas id="canvas-preview-dark"></canvas>
            <div class="filter-name" id="txt-filter-dark">⚫ Dark</div>
        </div>
        <div class="filter-card" onclick="onFilterClick('soft')">
            <div class="card-loader" id="loader-soft"><div class="spinner-small"></div></div>
            <canvas id="canvas-preview-soft"></canvas>
            <div class="filter-name" id="txt-filter-soft">🌑 Soft</div>
        </div>
        <div class="filter-card" onclick="onFilterClick('sepia')">
            <div class="card-loader" id="loader-sepia"><div class="spinner-small"></div></div>
            <canvas id="canvas-preview-sepia"></canvas>
            <div class="filter-name" id="txt-filter-sepia">📜 Sepia</div>
        </div>
        <div class="filter-card" onclick="onFilterClick('dimmed')">
            <div class="card-loader" id="loader-dimmed"><div class="spinner-small"></div></div>
            <canvas id="canvas-preview-dimmed"></canvas>
            <div class="filter-name" id="txt-filter-dimmed">🕶️ Dimmed</div>
        </div>
    </div>
</div>

<script>
    const translations = {
        tr: {
            title: "Dark Mode PDF",
            subtitle: "Gelişmiş Okuma Modu",
            dropText: "PDF Dosyası Seç",
            dropTextMulti: "PDF Dosyaları Seç (Maks 5)",
            statusReady: "Bir stil seçin:",
            statusVipOnly: "Çoklu seçim sadece VIP'ler içindir!",
            statusLimit: "En fazla 5 dosya seçebilirsiniz!",
            statusProcessing: "Dönüştürülüyor...",
            statusGenerating: "Önizlemeler Hazırlanıyor...",
            statusSaved: "✅ PDF Hazır!",
            statusOpening: "📖 PDF Açılıyor...",
            statusComplete: "✅ Tüm PDF'ler Hazır!",
            toastSingleFile: "📥 PDF Downloads klasörüne indirildi",
            toastMultiFile: "📥 {count} dosya Downloads'a indirildi",
            vipText: "🎥 Reklam İzle 👉 VIP Ol",
            vipActive: "VIP Modu Aktif!",
            vipBenefits: "✨ Reklamsız & 5 Dosya & Otomatik Açma",
            filterDark: "⚫ Koyu",
            filterSoft: "🌑 Yumuşak",
            filterSepia: "📜 Kitap Modu",
            filterDimmed: "🕶️ Gece Modu",
            btnOpen: "📖 PDF'i Aç",
            btnOpenLast: "📖 Son Dosyayı Aç",
            errorMsg: "Hata! Tekrar deneyin."
        },
        en: {
            title: "Dark Mode PDF",
            subtitle: "Advanced Reading Mode",
            dropText: "Select PDF File",
            dropTextMulti: "Select PDF Files (Max 5)",
            statusReady: "Select a style:",
            statusVipOnly: "Multi-select is for VIP only!",
            statusLimit: "Maximum 5 files allowed!",
            statusProcessing: "Converting...",
            statusGenerating: "Generating Previews...",
            statusSaved: "✅ PDF Ready!",
            statusOpening: "📖 Opening PDF...",
            statusComplete: "✅ All PDFs Ready!",
            toastSingleFile: "📥 PDF saved to Downloads folder",
            toastMultiFile: "📥 {count} files saved to Downloads",
            vipText: "🎥 Watch Ad 👉 Get VIP",
            vipActive: "VIP Mode Active!",
            vipBenefits: "✨ No Ads & 5 Files & Auto-Open",
            filterDark: "⚫ Dark",
            filterSoft: "🌑 Soft",
            filterSepia: "📜 Sepia",
            filterDimmed: "🕶️ Dimmed",
            btnOpen: "📖 Open PDF",
            btnOpenLast: "📖 Open Last File",
            errorMsg: "Error! Try again."
        }
    };

    let currentLang = localStorage.getItem('appLanguage') || 'en';
    let isConverting = false;
    let selectedModeAfterAd = null;
    let lastSavedPdfPath = null;
    const fileInput = document.getElementById('fileInput');
    const status = document.getElementById('status');

    // State'i sıfırlama fonksiyonu
    function resetUIState() {
        isConverting = false;
        selectedModeAfterAd = null;
        document.getElementById('convertBtn').style.display = 'none';
        document.getElementById('filter-grid').style.display = 'none';
        document.getElementById('dropText').style.display = 'block';
        document.getElementById('fileInfo').style.display = 'none';
        status.innerText = '';

        // Canvas'ları temizle
        ['dark', 'soft', 'sepia', 'dimmed'].forEach(mode => {
            document.getElementById(`loader-${mode}`).style.display = 'flex';
        });
    }

    async function handleFiles(files) {
        if (isConverting) return;

        // Önce state'i sıfırla
        resetUIState();

        const t = translations[currentLang];
        const isVip = isVipActive();

        if (!isVip && files.length > 1) {
            alert(t.statusVipOnly);
            fileInput.value = "";
            return;
        }
        if (files.length > 5) {
            alert(t.statusLimit);
            fileInput.value = "";
            return;
        }

        document.getElementById('convertBtn').style.display = 'none';
        document.getElementById('filter-grid').style.display = 'grid';
        document.getElementById('dropText').style.display = 'none';
        document.getElementById('fileInfo').innerText = files.length > 1 ? `${files.length} Files` : files[0].name;
        document.getElementById('fileInfo').style.display = 'block';
        status.innerText = t.statusGenerating;

        const modes = ['dark', 'soft', 'sepia', 'dimmed'];
        const ids = {
            dark: ['canvas-preview-dark', 'loader-dark'],
            soft: ['canvas-preview-soft', 'loader-soft'],
            sepia: ['canvas-preview-sepia', 'loader-sepia'],
            dimmed: ['canvas-preview-dimmed', 'loader-dimmed']
        };

        for (const m of modes) {
            await generatePreviewForMode(files[0], m, ids[m][0], ids[m][1]);
            await new Promise(r => setTimeout(r, 50));
        }
        status.innerText = t.statusReady;
    }

    async function generatePreviewForMode(file, mode, canvasId, loaderId) {
        let pdfDoc = null;
        try {
            const arrayBuffer = await file.arrayBuffer();
            pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer);
            const newPdf = await PDFLib.PDFDocument.create();
            const [page] = await newPdf.embedPages([pdfDoc.getPages()[0]]);
            const { width, height } = page.size();
            const newPage = newPdf.addPage([width, height]);
            drawModeLayer(newPage, width, height, mode, page);
            const bytes = await newPdf.save();
            await renderToCanvas(bytes.buffer, canvasId);
            document.getElementById(loaderId).style.display = 'none';
            pdfDoc = null;
        } catch (e) {
            console.error(e);
        }
    }

    async function renderToCanvas(buffer, canvasId) {
        let task = pdfjsLib.getDocument({data: buffer});
        const pdf = await task.promise;
        const page = await pdf.getPage(1);
        const canvas = document.getElementById(canvasId);
        const context = canvas.getContext('2d');
        const viewport = page.getViewport({ scale: (canvas.parentElement.clientWidth / page.getViewport({scale:1}).width) });
        canvas.height = viewport.height;
        canvas.width = viewport.width;
        await page.render({ canvasContext: context, viewport }).promise;
        page.cleanup();
        await pdf.destroy();
    }

    function onFilterClick(mode) {
        if (!fileInput.files.length || isConverting) return;

        // Filter kartlarına loading efekti ekle
        document.querySelectorAll('.filter-card').forEach(card => {
            card.style.opacity = '0.5';
            card.style.pointerEvents = 'none';
        });

        const isVip = isVipActive();
        if (isVip) {
            startConversionProcess(mode);
        } else {
            selectedModeAfterAd = mode;
            isConverting = false;
            if (window.Android && window.Android.showBigAd) {
                window.Android.showBigAd();
            } else {
                startConversionProcess(mode);
            }
        }
    }

    window.onBigAdClosed = function() {
        isConverting = false;

        // Filter kartlarının opacity'sini geri al
        document.querySelectorAll('.filter-card').forEach(card => {
            card.style.opacity = '1';
            card.style.pointerEvents = 'auto';
        });

        if (selectedModeAfterAd) {
            startConversionProcess(selectedModeAfterAd);
            selectedModeAfterAd = null;
        }
    };

    async function startConversionProcess(mode) {
        if (isConverting) return;
        isConverting = true;
        const t = translations[currentLang];
        status.innerText = t.statusProcessing;

        try {
            let lastFileName;
            for (const file of fileInput.files) {
                const res = await processFile(file, mode);
                lastFileName = res.name;
            }

            const downloadPath = "/storage/emulated/0/Download/" + lastFileName;
            lastSavedPdfPath = downloadPath;
            const isVip = isVipActive();

            // Kaydedildi mesajı
            status.innerText = fileInput.files.length === 1 ? t.statusSaved : t.statusComplete;

            // AÇ butonu göster
            const btn = document.getElementById('convertBtn');
            btn.style.display = 'block';
            btn.innerText = fileInput.files.length === 1 ? t.btnOpen : t.btnOpenLast;
            btn.onclick = () => {
                if (window.Android && window.Android.openPdfByPath && lastSavedPdfPath) {
                    window.Android.openPdfByPath(lastSavedPdfPath);
                }
            };

            // Toast mesajı göster (Android)
            if (window.Android && window.Android.showToast) {
                const msg = fileInput.files.length === 1
                    ? t.toastSingleFile
                    : t.toastMultiFile.replace('{count}', fileInput.files.length);
                window.Android.showToast(msg);
            }

            // VIP ise tek dosyayı OTOMATIK AÇ
            if (isVip && fileInput.files.length === 1) {
                setTimeout(() => {
                    if (window.Android && window.Android.openPdfByPath) {
                        window.Android.openPdfByPath(lastSavedPdfPath);
                        status.innerText = t.statusOpening;
                    }
                }, 800); // 800ms bekle (kaydedilmesi için)
            }
        } catch (e) {
            status.innerText = t.errorMsg;
            console.error(e);

            // Hata olursa filter kartlarını tekrar aktif et
            document.querySelectorAll('.filter-card').forEach(card => {
                card.style.opacity = '1';
                card.style.pointerEvents = 'auto';
            });
        } finally {
            isConverting = false;

            // Filter kartlarını tekrar aktif et
            document.querySelectorAll('.filter-card').forEach(card => {
                card.style.opacity = '1';
                card.style.pointerEvents = 'auto';
            });

            if(window.Android && window.Android.requestAppReview) {
                window.Android.requestAppReview();
            }
        }
    }

async function processFile(file, mode) {
    const arrayBuffer = await file.arrayBuffer();
    const doc = await PDFLib.PDFDocument.load(arrayBuffer);
    const newDoc = await PDFLib.PDFDocument.create();

    const pageCount = doc.getPageCount();
    const t = translations[currentLang];

    for (let i = 0; i < pageCount; i++) {
        // Her 5 sayfada bir % göster ve UI'yi güncelle
        if (i % 5 === 0) {
            const progress = Math.round((i / pageCount) * 100);
            status.innerText = `${t.statusProcessing} ${progress}%`;
            await new Promise(r => setTimeout(r, 0)); // UI güncellenmesi için
        }

        const [embeddedPage] = await newDoc.embedPages([doc.getPages()[i]]);
        const { width, height } = embeddedPage.size();
        const newP = newDoc.addPage([width, height]);
        drawModeLayer(newP, width, height, mode, embeddedPage);
    }

    // Tamamlandı mesajı
    status.innerText = `${t.statusProcessing} 100%`;

    const pdfBytes = await newDoc.save();
        const blob = new Blob([pdfBytes], { type: "application/pdf" });
        const uniqueName = `DarkMode_${Date.now()}_${file.name}`;

        // Android Bridge ile kaydet
        await saveToAndroid(blob, uniqueName);

        return { name: uniqueName };
    }

    function drawModeLayer(page, w, h, mode, embed) {
        page.drawRectangle({ x: 0, y: 0, width: w, height: h, color: PDFLib.rgb(1,1,1) });
        page.drawPage(embed, { x: 0, y: 0, width: w, height: h });
        if (mode === 'dark') {
            page.drawRectangle({ x: 0, y: 0, width: w, height: h, color: PDFLib.rgb(1,1,1), blendMode: PDFLib.BlendMode.Difference });
        } else if (mode === 'soft') {
            page.drawRectangle({ x: 0, y: 0, width: w, height: h, color: PDFLib.rgb(1,1,1), blendMode: PDFLib.BlendMode.Difference });
            page.drawRectangle({ x: 0, y: 0, width: w, height: h, color: PDFLib.rgb(0,0,0), opacity: 0.25 });
        } else if (mode === 'sepia') {
            page.drawRectangle({ x: 0, y: 0, width: w, height: h, color: PDFLib.rgb(0.82, 0.76, 0.60), blendMode: PDFLib.BlendMode.Multiply });
        } else if (mode === 'dimmed') {
            page.drawRectangle({ x: 0, y: 0, width: w, height: h, color: PDFLib.rgb(0,0,0), opacity: 0.7 });
        }
    }

    // ============ ANDROID BRIDGE İLE KAYDET ============
async function saveToAndroid(blob, fileName) {
    const blobSizeMB = blob.size / 1024 / 1024;

    // 20 MB'dan küçükse normal kaydet
    if (blobSizeMB < 20 && window.Android && window.Android.savePdfOnly) {
        return saveNormal(blob, fileName);
    }

    // 20 MB'dan büyükse chunk ile kaydet
    if (window.Android && window.Android.saveFileChunk) {
        return saveWithChunks(blob, fileName);
    }

    // Fallback: Normal kaydet (riskli ama başka çare yok)
    return saveNormal(blob, fileName);
}

// Normal kaydetme
async function saveNormal(blob, fileName) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onloadend = () => {
            try {
                const base64Data = reader.result.split(',')[1];
                window.Android.savePdfOnly(base64Data, fileName);
                lastSavedPdfPath = "/storage/emulated/0/Download/" + fileName;
                resolve();
            } catch (e) {
                reject(e);
            }
        };
        reader.onerror = reject;
        reader.readAsDataURL(blob);
    });
}

// Chunk ile kaydetme
async function saveWithChunks(blob, fileName) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onloadend = async () => {
            try {
                const base64Data = reader.result.split(',')[1];
                const CHUNK_SIZE = 512 * 1024; // 512 KB
                const totalLength = base64Data.length;
                let offset = 0;

                while (offset < totalLength) {
                    const chunk = base64Data.slice(offset, offset + CHUNK_SIZE);
                    const isFirst = (offset === 0);
                    window.Android.saveFileChunk(fileName, chunk, isFirst);
                    offset += CHUNK_SIZE;
                    await new Promise(r => setTimeout(r, 10));
                }
                window.Android.finalizeChunkedFile(); // ✅

                lastSavedPdfPath = "/storage/emulated/0/Download/" + fileName;
                resolve();
            } catch (e) {
                reject(e);
            }
        };
        reader.onerror = reject;
        reader.readAsDataURL(blob);
    });
}
    function isVipActive() {
        const exp = localStorage.getItem('vipExpiry');
        return exp ? (new Date().getTime() < parseInt(exp)) : false;
    }

    function handleVipClick() {
        if (isVipActive()) return;
        if (window.Android && window.Android.showRewardedAd) {
            window.Android.showRewardedAd();
        } else {
            activateVip();
        }
    }

    window.onRewardedAdCompleted = function(s) {
        if (s) activateVip();
    };

    function activateVip() {
        localStorage.setItem('vipExpiry', new Date().getTime() + (3 * 60 * 60 * 1000));
        location.reload();
    }

    function setLanguage(l) {
        currentLang = l;
        localStorage.setItem('appLanguage', l);
        updateUI();
    }

    function updateUI() {
        const t = translations[currentLang];
        document.getElementById('txt-title').innerText = t.title;
        document.getElementById('txt-subtitle').innerText = t.subtitle;
        document.getElementById('txt-filter-dark').innerText = t.filterDark;
        document.getElementById('txt-filter-soft').innerText = t.filterSoft;
        document.getElementById('txt-filter-sepia').innerText = t.filterSepia;
        document.getElementById('txt-filter-dimmed').innerText = t.filterDimmed;
        document.getElementById('btn-tr').classList.toggle('active', currentLang === 'tr');
        document.getElementById('btn-en').classList.toggle('active', currentLang === 'en');

        const vip = isVipActive();
        document.getElementById('txt-vip').innerText = vip ? t.vipActive : t.vipText;
        document.getElementById('vip-benefits').innerText = t.vipBenefits;
        document.getElementById('vip-benefits').classList.toggle('hidden', vip);
        document.getElementById('dropText').innerText = vip ? t.dropTextMulti : t.dropText;

        if(vip) {
            fileInput.setAttribute('multiple', 'multiple');
        } else {
            fileInput.removeAttribute('multiple');
        }

        // Banner göster/gizle
        if (window.Android) {
            if (vip) {
                window.Android.hideBannerAds();
            } else {
                window.Android.showBannerAds();
            }
        }
    }

    // Drag & Drop Event Listeners
    const dz = document.getElementById('dropZone');
    dz.addEventListener('dragover', (e) => {
        e.preventDefault();
        dz.classList.add('dragover');
    });
    dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
    dz.addEventListener('drop', (e) => {
        e.preventDefault();
        dz.classList.remove('dragover');
        fileInput.files = e.dataTransfer.files;
        handleFiles(e.dataTransfer.files);
    });
    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
            handleFiles(e.target.files);
        }
    });

   
    document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible' && !isConverting) {
            // Sayfa geri geldiğinde filter kartlarını aktif et
            document.querySelectorAll('.filter-card').forEach(card => {
                card.style.opacity = '1';
                card.style.pointerEvents = 'auto';
            });
        }
    });

  
    updateUI();
</script>
</body>
</html>
